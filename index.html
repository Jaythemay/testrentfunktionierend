function useLanguage() {
  const [lang, setLangState] = useState(() => {
    try { return window.localStorage.getItem("testrent_lang") || "de"; } catch(e) { return "de"; }
  });
  function setLang(newLang) {
    setLangState(newLang);
    try { window.localStorage.setItem("testrent_lang", newLang); } catch(e) {}
  }
  const t = (key) => (TRANSLATIONS[lang] && TRANSLATIONS[lang][key]) || TRANSLATIONS.de[key] || key;
  return { lang, setLang, t };
}

function useTheme() {
  const [design, setDesignState] = useState(() => {
    let d = "classic";
    try { d = window.localStorage.getItem("testrent_design") || "classic"; } catch(e) {}
    document.documentElement.setAttribute("data-theme", d);
    return d;
  });
  useEffect(() => {
    if (design !== "led") return;
    let raf;
    function tick(timestamp) {
      const hue = (timestamp / 30) % 360; // full color cycle roughly every ~11s
      document.documentElement.style.setProperty("--rgb-hue", hue.toFixed(1));
      raf = requestAnimationFrame(tick);
    }
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [design]);
  function setDesign(newDesign) {
    setDesignState(newDesign);
    document.documentElement.setAttribute("data-theme", newDesign);
    try { window.localStorage.setItem("testrent_design", newDesign); } catch(e) {}
  }
  return { design, setDesign };
}

function useRefreshInterval() {
  const [intervalMs, setIntervalMsState] = useState(() => {
    let v = 10000;
    try { v = parseInt(window.localStorage.getItem("testrent_refresh_interval"), 10) || 10000; } catch(e) {}
    return v;
  });
  function setIntervalMs(newVal) {
    setIntervalMsState(newVal);
    try { window.localStorage.setItem("testrent_refresh_interval", String(newVal)); } catch(e) {}
  }
  return { refreshInterval: intervalMs, setRefreshInterval: setIntervalMs };
}

function useNotificationSettings() {
  const [settings, setSettingsState] = useState(() => {
    let s = { soundBooking: true, soundChat: true, push: false };
    try {
      const saved = window.localStorage.getItem("testrent_notifications");
      if (saved) s = { ...s, ...JSON.parse(saved) };
    } catch(e) {}
    return s;
  });
  function updateSettings(patch) {
    setSettingsState(prev => {
      const next = { ...prev, ...patch };
      try { window.localStorage.setItem("testrent_notifications", JSON.stringify(next)); } catch(e) {}
      return next;
    });
  }
  return { notifSettings: settings, updateNotifSettings: updateSettings };
}

function useNotificationSound() {
  const ctxRef = useRef(null);
  return function playBeep() {
    try {
      if (!ctxRef.current) ctxRef.current = new (window.AudioContext || window.webkitAudioContext)();
      const ctx = ctxRef.current;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = "sine";
      osc.frequency.value = 880;
      osc.connect(gain); gain.connect(ctx.destination);
      const now = ctx.currentTime;
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.22, now + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.35);
      osc.start(now);
      osc.stop(now + 0.36);
    } catch(e) {}
  };
}

function sendPushNotification(title, body) {
  try {
    if (!("Notification" in window)) return;
    if (Notification.permission === "granted") new Notification(title, { body });
  } catch(e) {}
}

async function fetchSheet(range) {
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${range}?key=${GOOGLE_API_KEY}`;
  const res = await fetch(url);
  const data = await res.json();
  return data.values || [];
}

async function fetchSheetBatch(ranges) {
  const params = ranges.map(r => `ranges=${encodeURIComponent(r)}`).join("&");
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values:batchGet?${params}&key=${GOOGLE_API_KEY}`;
  const res = await fetch(url);
  const data = await res.json();
  return (data.valueRanges || []).map(vr => vr.values || []);
}

function useSheetData(intervalMs) {
  const [bookings, setBookings] = useState([]);
  const [chats, setChats] = useState([]);
  const [vehicles, setVehicles] = useState([]);
  const [customers, setCustomers] = useState([]);

  const load = async () => {
    try {
      const [bRows, cRows, vRows, kRows, dRows] = await fetchSheetBatch([
        "Buchungen!A2:H200", "Chats!A2:E500", "Fahrzeuge!A2:E300", "Kunden!A2:E500", "Schaeden!A2:F500"
      ]);
      setBookings(bRows.map(r => ({
        id: r[0]||"", name: r[1]||"", telefon: r[2]||"", auto: r[3]||"",
        von: r[4]||"", bis: r[5]||"", preis: r[6]||"", status: r[7]||""
      })).filter(r => r.id));
      setChats(cRows.map(r => ({
        zeitstempel: r[0]||"", telefon: r[1]||"", name: r[2]||"",
        rolle: r[3]||"", nachricht: r[4]||""
      })).filter(r => r.nachricht));
      setVehicles(vRows.map(r => ({
        kennzeichen: r[0]||"", modell: r[1]||"", baujahr: r[2]||"",
        preis: r[3]||"", status: r[4]||"Aktiv"
      })).filter(r => r.kennzeichen));
      setCustomers(kRows.map(r => ({
        telefon: r[0]||"", name: r[1]||"", letzteBuchung: r[2]||"",
        anzahlBuchungen: r[3]||"0", notizen: r[4]||""
      })).filter(r => r.telefon));
      setDamages((dRows||[]).map(r => ({
        buchungsId: r[0]||"", typ: r[1]||"", notiz: r[2]||"",
        fotoLink: r[3]||"", zeitstempel: r[4]||"", kmStand: r[5]||""
      })).filter(r => r.buchungsId));
      setLastUpdated(new Date());
    } catch(e) { console.error(e); }
  };

  useEffect(() => { load(); const t = setInterval(load, intervalMs); return () => clearInterval(t); }, [intervalMs]);
  return { bookings, chats, vehicles, customers, damages, lastUpdated };
}

function parseDate(str) {
  const p = (str||"").split(".");
  if (p.length !== 3) return null;
  return new Date(`${p[2]}-${p[1]}-${p[0]}`);
}

function getCarStatus(bookings, fleet) {
  const today = new Date();
  today.setHours(0,0,0,0);
  const statusMap = {};
  fleet.forEach(car => {
    const carBookings = bookings
      .filter(b => b.auto === car.name && b.status === "Bestätigt")
      .map(b => ({ ...b, vonDate: parseDate(b.von), bisDate: parseDate(b.bis) }))
      .filter(b => b.vonDate && b.bisDate)
      .sort((a, b) => a.vonDate - b.vonDate);
    const currentBooking = carBookings.find(b => today >= b.vonDate && today <= b.bisDate);
    if (currentBooking) {
      let nextFree = new Date(currentBooking.bisDate);
      nextFree.setDate(nextFree.getDate() + 1);
      let checking = true;
      while (checking) {
        const overlap = carBookings.find(b => b !== currentBooking && nextFree >= b.vonDate && nextFree <= b.bisDate);
        if (overlap) { nextFree = new Date(overlap.bisDate); nextFree.setDate(nextFree.getDate() + 1); }
        else checking = false;
      }
      statusMap[car.name] = { booked: true, until: currentBooking.bis, nextFree: nextFree.toLocaleDateString("de-AT", {day:"2-digit",month:"2-digit",year:"numeric"}), customer: currentBooking.name };
    } else {
      const nextBooking = carBookings.find(b => b.vonDate > today);
      statusMap[car.name] = { booked: false, nextBooking: nextBooking ? { from: nextBooking.von, name: nextBooking.name } : null };
    }
  });
  return statusMap;
}

function getBookedCars(bookings, fleet) {
  const statusMap = getCarStatus(bookings, fleet);
  const booked = new Set();
  Object.entries(statusMap).forEach(([name, s]) => { if (s.booked) booked.add(name); });
  return booked;
}

function getTotalRevenue(b) {
  return b.reduce((s,x) => { const p=parseFloat((x.preis||"0").replace(/[^\d.]/g,"")); return s+(isNaN(p)?0:p); }, 0);
}

function groupChatsByPhone(chats) {
  const g = {};
  chats.forEach(c => { if(!g[c.telefon]) g[c.telefon]=[]; g[c.telefon].push(c); });
  return g;
}

function exportCSV(filename, rows, columns) {
  const escape = (v) => {
    const s = v === undefined || v === null ? "" : String(v);
    if (s.includes(",") || s.includes('"') || s.includes("\n")) {
      return '"' + s.replace(/"/g, '""') + '"';
    }
    return s;
  };
  const headerLine = columns.map(c => escape(c.label)).join(",");
  const dataLines = rows.map(row => columns.map(c => escape(row[c.key])).join(","));
  const csv = "\uFEFF" + [headerLine, ...dataLines].join("\n");
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

  }

  function generateId() {
    const n = Math.floor(Math.random() * 900) + 100;
    return `BK-2026-${n}`;
  }

  async function handleSubmit() {
    if (!form.name || !form.telefon || !form.von || !form.bis || !form.preis) {
      setError(t("pflichtfelder"));
      return;
    }
    setSubmitting(true);

const CANCEL_WEBHOOK_URL = "https://patrickscloud.app.n8n.cloud/webhook/buchung-stornieren";

function StornierenModal({ booking, onClose, onSuccess, t }) {
  const [submitting, setSubmitting] = useState(false);
  const [error, setError] = useState("");

  const vonDate = parseDate(booking.von);
  const now = new Date();
  const hoursUntilStart = vonDate ? (vonDate - now) / (1000 * 60 * 60) : null;
  const isFreeCancel = hoursUntilStart !== null && hoursUntilStart >= 24;

  async function handleCancel() {
    setSubmitting(true);
    setError("");
    try {
      const res = await fetch(CANCEL_WEBHOOK_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          buchungsId: booking.id,
          sheetId: SHEET_ID,
          name: booking.name,
          telefon: booking.telefon,
          von: booking.von
        })
      });
      if (!res.ok) throw new Error("Server-Fehler");
      onSuccess();
    } catch (e) {
      setError(t("fehler_speichern"));
    }
    setSubmitting(false);
  }

  return (
    <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"var(--c-overlay)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}} onClick={onClose}>

        </div>

        <div style={{background:"var(--c-surface-alt)",borderRadius:8,padding:"12px",marginBottom:"1rem"}}>
          <div style={{fontSize:13,color:"var(--c-text-body)",fontWeight:500}}>{booking.name}</div>
          <div style={{fontSize:12,color:"var(--c-text-faint)",marginTop:2}}>{booking.auto} · {booking.von} – {booking.bis}</div>
          <div style={{fontSize:12,color:"var(--c-text-muted)",marginTop:2}}>{booking.preis}</div>
        </div>

        {hoursUntilStart === null ? (
          <div style={{fontSize:13,color:"var(--c-warning)",background:"var(--c-warning-bg)",padding:"10px 12px",borderRadius:8,marginBottom:"1rem"}}>
            ⚠️ {t("datum_unklar")}

          <div style={{fontSize:13,color:"var(--c-success)",background:"var(--c-success-bg)",border:"1px solid var(--c-success-border)",padding:"10px 12px",borderRadius:8,marginBottom:"1rem"}}>
            ✅ {t("kostenlos_moeglich")} {Math.round(hoursUntilStart)} {t("stunden_entfernt")}
          </div>
        ) : (
          <div style={{fontSize:13,color:"var(--c-danger)",background:"var(--c-danger-bg)",border:"1px solid var(--c-danger-border)",padding:"10px 12px",borderRadius:8,marginBottom:"1rem"}}>
            ⚠️ {t("gebuehr_faellig_msg")} {Math.max(0,Math.round(hoursUntilStart))} {t("stunden_entfernt_weniger")}
          </div>
        )}

        {error && <div style={{fontSize:12,color:"var(--c-danger)",background:"var(--c-danger-bg)",padding:"8px 12px",borderRadius:8,marginBottom:"1rem"}}>{error}</div>}

        <div style={{display:"flex",gap:8}}>

      </div>
    </div>

function BuchungenPage({ bookings, fleet, t }) {
  const [search, setSearch] = useState("");
  const [filterStatus, setFilterStatus] = useState("Alle");
  const [filterAuto, setFilterAuto] = useState("Alle");
  const [sortBy, setSortBy] = useState("von");
  const [sortDir, setSortDir] = useState("desc");
  const [showModal, setShowModal] = useState(false);
  const [justAdded, setJustAdded] = useState(false);
  const [cancelTarget, setCancelTarget] = useState(null);
  const [justCancelled, setJustCancelled] = useState(false);

  const filtered = useMemo(() => {
    return bookings
      .filter(b => {
        const q = search.toLowerCase();
        const matchSearch = !q || b.name.toLowerCase().includes(q) || b.id.toLowerCase().includes(q) || b.auto.toLowerCase().includes(q) || b.telefon.includes(q);
        const matchStatus = filterStatus === "Alle" || b.status === filterStatus;
        const matchAuto = filterAuto === "Alle" || b.auto === filterAuto;
        return matchSearch && matchStatus && matchAuto;
      })
      .sort((a, b) => {
        let va = a[sortBy]||"", vb = b[sortBy]||"";
        if (sortBy === "preis") { va = parseFloat(va.replace(/[^\d.]/g,"")||0); vb = parseFloat(vb.replace(/[^\d.]/g,"")||0); }
        return sortDir === "asc" ? (va > vb ? 1 : -1) : (va < vb ? 1 : -1);
      });
  }, [bookings, search, filterStatus, filterAuto, sortBy, sortDir]);

  const nowB = new Date();
  const thisMonthFiltered = filtered.filter(b => {
    const p = (b.von||"").split(".");
    if (p.length !== 3) return false;
    const d = new Date(`${p[2]}-${p[1]}-${p[0]}`);
    return d.getFullYear() === nowB.getFullYear() && d.getMonth() === nowB.getMonth();
  });
  const totalRevenue = getTotalRevenue(thisMonthFiltered);
  const confirmed = filtered.filter(b => b.status === "Bestätigt").length;
  const completed = filtered.filter(b => b.status === "Abgeschlossen").length;

  function toggleSort(col) {
    if (sortBy === col) setSortDir(d => d === "asc" ? "desc" : "asc");
    else { setSortBy(col); setSortDir("desc"); }
  }

  function SortIcon({ col }) {
    if (sortBy !== col) return <span style={{opacity:0.3}}>↕</span>;
    return <span>{sortDir === "asc" ? "↑" : "↓"}</span>;
  }

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"1.5rem"}}>
        <div>
          <h1 style={{fontSize:22,fontWeight:600,color:"var(--c-text-heading)",margin:0}}>{t("buchungen_title")}</h1>
          <p style={{fontSize:12,color:"var(--c-text-faint)",marginTop:4}}>{t("buchungen_sub")}</p>
        </div>
        <button onClick={() => setShowModal(true)} style={{padding:"9px 16px",borderRadius:8,border:"1px solid var(--c-accent)",background:"var(--c-accent-bg)",color:"var(--c-accent-text)",fontWeight:500,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>
          📞 {t("buchungen_neu")}
        </button>
      </div>

      {justAdded && (
        <div style={{fontSize:13,color:"var(--c-success)",background:"var(--c-success-bg)",border:"1px solid var(--c-success-border)",padding:"10px 14px",borderRadius:8,marginBottom:"1rem"}}>
          ✅ {t("buchung_speichern")}! ({t("erscheint_10s")})
        </div>
      )}

      {justCancelled && (
        <div style={{fontSize:13,color:"var(--c-warning)",background:"var(--c-warning-bg)",border:"1px solid var(--c-warning-border)",padding:"10px 14px",borderRadius:8,marginBottom:"1rem"}}>
          ❌ {t("buchung_storniert_msg")} ({t("erscheint_10s")})

const FLEET_WEBHOOK_URL = "https://patrickscloud.app.n8n.cloud/webhook/fahrzeug-verwalten";

function useFleetData(intervalMs) {
  const [vehicles, setVehicles] = useState([]);
  const [loading, setLoading] = useState(true);

  const load = async () => {
    try {
      const rows = await fetchSheet("Fahrzeuge!A2:E300");
      setVehicles(rows.map(r => ({
        kennzeichen: r[0]||"", modell: r[1]||"", baujahr: r[2]||"",
        preis: r[3]||"", status: r[4]||"Aktiv"
      })).filter(r => r.kennzeichen));
    } catch(e) { console.error(e); }
    setLoading(false);
  };

  useEffect(() => { load(); const t = setInterval(load, intervalMs); return () => clearInterval(t); }, [intervalMs]);
  return { vehicles, loading };
}

function FahrzeugFormModal({ vehicle, onClose, onSuccess, t }) {
  const isEdit = !!vehicle;
  const [form, setForm] = useState({
    kennzeichen: vehicle?.kennzeichen || "",
    modell: vehicle?.modell || "",
    baujahr: vehicle?.baujahr || "",
    preis: vehicle?.preis?.replace(/[^\d.]/g,"") || "",
    status: vehicle?.status || "Aktiv"
  });
  const [submitting, setSubmitting] = useState(false);
  const [error, setError] = useState("");

  function update(field, value) { setForm(f => ({ ...f, [field]: value })); }

  async function handleSubmit() {
    if (!form.kennzeichen || !form.modell || !form.preis) {
      setError(t("pflichtfelder"));
      return;
    }
    setSubmitting(true);
    setError("");
    try {
      const payload = {
        action: isEdit ? "update" : "add",
        sheetId: SHEET_ID,
        kennzeichen: form.kennzeichen,
        modell: form.modell,
        baujahr: form.baujahr,
        preis: form.preis.includes("EUR") ? form.preis : `${form.preis} EUR`,
        status: form.status
      };
      const res = await fetch(FLEET_WEBHOOK_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      if (!res.ok) throw new Error("Server-Fehler");
      onSuccess();
    } catch (e) {
      setError(t("fehler_speichern"));
    }
    setSubmitting(false);
  }

  return (
    <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"var(--c-overlay)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}} onClick={onClose}>

        </div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <div>
            <label style={{fontSize:11,color:"var(--c-text-faint)",marginBottom:4,display:"block"}}>{t("kennzeichen")}</label>
            <input value={form.kennzeichen} onChange={e => update("kennzeichen", e.target.value)} placeholder="W-12345" disabled={isEdit} style={{width:"100%",opacity:isEdit?0.6:1}} />
          </div>
          <div>
            <label style={{fontSize:11,color:"var(--c-text-faint)",marginBottom:4,display:"block"}}>{t("modell")}</label>
            <input value={form.modell} onChange={e => update("modell", e.target.value)} placeholder="VW Polo 2020" style={{width:"100%"}} />
          </div>
          <div style={{display:"flex",gap:10}}>
            <div style={{flex:1}}>
              <label style={{fontSize:11,color:"var(--c-text-faint)",marginBottom:4,display:"block"}}>{t("baujahr")}</label>
              <input value={form.baujahr} onChange={e => update("baujahr", e.target.value)} placeholder="2020" style={{width:"100%"}} />
            </div>
            <div style={{flex:1}}>
              <label style={{fontSize:11,color:"var(--c-text-faint)",marginBottom:4,display:"block"}}>{t("preis_tag")} (EUR)</label>
              <input value={form.preis} onChange={e => update("preis", e.target.value)} placeholder="60" style={{width:"100%"}} />
            </div>
          </div>
          {isEdit && (
            <div>
              <label style={{fontSize:11,color:"var(--c-text-faint)",marginBottom:4,display:"block"}}>{t("status")}</label>
              <select value={form.status} onChange={e => update("status", e.target.value)} style={{width:"100%"}}>
                <option value="Aktiv">{t("aktiv_caps")}</option>
                <option value="Inaktiv">{t("inaktiv")}</option>
                <option value="In Wartung">{t("in_wartung")}</option>

            </div>
          )}
          {error && <div style={{fontSize:12,color:"var(--c-danger)",background:"var(--c-danger-bg)",padding:"8px 12px",borderRadius:8}}>{error}</div>}
          <button onClick={handleSubmit} disabled={submitting} style={{marginTop:8,padding:"10px",borderRadius:8,border:"none",background:submitting?"var(--c-border-strong)":"var(--c-accent)",color:"var(--c-on-accent)",fontWeight:500,fontSize:13,cursor:submitting?"default":"pointer",fontFamily:"inherit"}}>
            {submitting ? t("wird_gespeichert") : isEdit ? t("aenderungen_speichern") : t("fahrzeug_hinzufuegen_titel")}
          </button>
        </div>
      </div>
    </div>
  );
}

function FahrzeugePage({ bookings, t, refreshInterval }) {
  const { vehicles, loading } = useFleetData(refreshInterval);

  const [filterStatus, setFilterStatus] = useState("Alle");
  const [showModal, setShowModal] = useState(false);
  const [editTarget, setEditTarget] = useState(null);
  const [deleteTarget, setDeleteTarget] = useState(null);
  const [toast, setToast] = useState("");

  function isCurrentlyBooked(modell) {
    const today = new Date();
    today.setHours(0,0,0,0);
    return bookings.some(b => {
      if (b.auto !== modell || b.status !== "Bestätigt") return false;
      const von = parseDate(b.von), bis = parseDate(b.bis);
      if (!von || !bis) return false;
      return today >= von && today <= bis;
    });
  }

  function getNextFreeDate(modell) {
    const today = new Date();
    today.setHours(0,0,0,0);
    const carBookings = bookings
      .filter(b => b.auto === modell && b.status === "Bestätigt")
      .map(b => ({ von: parseDate(b.von), bis: parseDate(b.bis) }))
      .filter(b => b.von && b.bis)
      .sort((a,b) => a.von - b.von);
    const current = carBookings.find(b => today >= b.von && today <= b.bis);
    if (!current) return null;
    let nextFree = new Date(current.bis);
    nextFree.setDate(nextFree.getDate() + 1);
    return nextFree.toLocaleDateString("de-AT");
  }

  const filtered = vehicles.filter(v => {
    const q = search.toLowerCase();
    const matchSearch = !q || v.modell.toLowerCase().includes(q) || v.kennzeichen.toLowerCase().includes(q);
    const matchStatus = filterStatus === "Alle" || v.status === filterStatus;
    return matchSearch && matchStatus;
  });

  const activeCount = vehicles.filter(v => v.status === "Aktiv").length;
  const bookedNow = vehicles.filter(v => v.status === "Aktiv" && isCurrentlyBooked(v.modell)).length;

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"1.5rem"}}>

}

const FILTER_LABELS = { Aktiv: "filter_aktiv", Heute: "filter_heute", Alle: "filter_alle" };

function ChatsPage({ chats, t }) {
  const groups = groupChatsByPhone(chats);
  const allPhones = Object.keys(groups);
  const [selected, setSelected] = useState(allPhones[0] || null);
  const [filter, setFilter] = useState("Aktiv");
  const [takenOver, setTakenOver] = useState({});
  const chatRef = useRef(null);

  const todayStr = new Date().toLocaleDateString("de-AT");

  function formatPhone(p) { return p.replace("whatsapp:", ""); }
  function getInitial(phone) { return phone.replace("whatsapp:+", "").slice(-4,-3) || "?"; }
  function getLastMessage(phone) {
    const msgs = groups[phone] || [];
    const last = msgs[msgs.length - 1];
    if (!last) return "";
    return (last.rolle === "ai" ? "KI: " : "") + (last.nachricht||"").slice(0,40) + ((last.nachricht||"").length > 40 ? "..." : "");
  }
  function getLastTime(phone) {
    const msgs = groups[phone] || [];
    const last = msgs[msgs.length - 1];
    return last ? (last.zeitstempel||"").split(",")[1]?.trim() || "" : "";
  }
  function isActive(phone) {
    const msgs = groups[phone] || [];
    return msgs[msgs.length - 1]?.rolle === "user";
  }
  function isFromToday(phone) {
    const msgs = groups[phone] || [];
    const last = msgs[msgs.length - 1];
    return last ? (last.zeitstempel||"").includes(todayStr.split(".")[0]) : false;
  }

  const filteredPhones = allPhones.filter(p => {
    if (filter === "Aktiv") return isActive(p) && !takenOver[p];
    if (filter === "Heute") return isFromToday(p);
    return true;
  }).sort((a, b) => {
    if (isActive(a) && !isActive(b)) return -1;
    if (!isActive(a) && isActive(b)) return 1;
    return 0;
  });

  useEffect(() => {
    if (filteredPhones.length > 0 && (!selected || !filteredPhones.includes(selected))) {
      setSelected(filteredPhones[0]);
    }
  }, [filter, chats.length]);

  useEffect(() => {
    if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
  }, [selected, chats.length]);

  const messages = selected ? (groups[selected] || []) : [];
  const lastMsg = messages[messages.length - 1];
  const isAiActive = lastMsg?.rolle === "user" && !takenOver[selected];
  const isHumanMode = takenOver[selected];

  if (allPhones.length === 0) return (
    <div>
      <div style={{marginBottom:"1.5rem"}}>
        <h1 style={{fontSize:22,fontWeight:600,color:"var(--c-text-heading)",margin:0}}>{t("chats_title")}</h1>
        <p style={{fontSize:12,color:"var(--c-text-faint)",marginTop:4}}>{t("chats_sub")}</p>

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"1.5rem"}}>
        <div>
          <h1 style={{fontSize:22,fontWeight:600,color:"var(--c-text-heading)",margin:0}}>{t("chats_title")}</h1>
          <p style={{fontSize:12,color:"var(--c-text-faint)",marginTop:4}}>{filteredPhones.length} / {allPhones.length} · {allPhones.filter(p => isActive(p) && !takenOver[p]).length} {t("ki_aktiv_anzahl")} · {Object.keys(takenOver).filter(p => takenOver[p]).length} {t("uebernommen")}</p>
        </div>
        <div style={{display:"flex",gap:6}}>
          {["Aktiv","Heute","Alle"].map(f => (
            <button key={f} onClick={() => setFilter(f)} style={{fontSize:12,padding:"6px 14px",borderRadius:20,border:`1px solid ${filter===f?"var(--c-accent)":"var(--c-border)"}`,background:filter===f?"var(--c-accent-bg)":"transparent",color:filter===f?"var(--c-accent-text)":"var(--c-text-faint)",cursor:"pointer",fontFamily:"inherit"}}>
              {t(FILTER_LABELS[f])} {f==="Aktiv"?`(${allPhones.filter(p=>isActive(p)&&!takenOver[p]).length})`:f==="Heute"?`(${allPhones.filter(isFromToday).length})`:`(${allPhones.length})`}
            </button>
          ))}
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"300px 1fr",gap:"1rem",height:"calc(100vh - 210px)"}}>
        <div className="card" style={{background:"var(--c-surface)",border:"1px solid var(--c-border)",borderRadius:12,overflow:"hidden",display:"flex",flexDirection:"column"}}>
          <div style={{padding:"12px 16px",borderBottom:"1px solid var(--c-border)",fontSize:11,color:"var(--c-text-faint)",textTransform:"uppercase",letterSpacing:"0.06em"}}>
            {t(FILTER_LABELS[filter])}
          </div>
          <div style={{overflowY:"auto",flex:1}}>
            {filteredPhones.length === 0 && (
              <div style={{padding:"2rem",fontSize:13,color:"var(--c-text-faint2)",textAlign:"center"}}>{t("keine_kunden_gefunden")}</div>
            )}
            {filteredPhones.map(phone => {

              const humanMode = takenOver[phone];
              const isSel = phone === selected;
              return (
                <div key={phone} onClick={() => setSelected(phone)} style={{padding:"12px 16px",cursor:"pointer",borderBottom:"1px solid var(--c-surface-alt)",background:isSel?"var(--c-border)":"transparent",display:"flex",alignItems:"center",gap:10}}>
                  <div style={{position:"relative",flexShrink:0}}>
                    <div style={{width:40,height:40,borderRadius:"50%",background:humanMode?"var(--c-success-bg3)":"var(--c-accent-bg2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,color:humanMode?"var(--c-success-text-light)":"var(--c-accent-text)",fontWeight:600}}>{getInitial(phone)}</div>
                    <div style={{position:"absolute",bottom:0,right:0,width:10,height:10,borderRadius:"50%",background:humanMode?"var(--c-success-text-light)":active?"var(--c-success)":"var(--c-text-faint2)",border:"2px solid var(--c-surface)"}} />
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div style={{fontSize:13,fontWeight:500,color:"var(--c-text-body)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{formatPhone(phone)}</div>
                      <div style={{fontSize:10,color:"var(--c-text-faint2)",flexShrink:0,marginLeft:4}}>{getLastTime(phone)}</div>
                    </div>
                    <div style={{fontSize:11,color:humanMode?"var(--c-success-text-light)":"var(--c-text-faint)",marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                      {humanMode ? "👤 Mitarbeiter übernommen" : getLastMessage(phone)}
                    </div>
                  </div>
                  {active && !humanMode && <div style={{width:8,height:8,borderRadius:"50%",background:"var(--c-success)",flexShrink:0}} />}
                </div>
              );
            })}
          </div>
        </div>

        <div className="card" style={{background:"var(--c-surface)",border:"1px solid var(--c-border)",borderRadius:12,display:"flex",flexDirection:"column",overflow:"hidden"}}>
          <div style={{padding:"14px 20px",borderBottom:"1px solid var(--c-border)",display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:36,height:36,borderRadius:"50%",background:isHumanMode?"var(--c-success-bg3)":"var(--c-accent-bg2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,color:isHumanMode?"var(--c-success-text-light)":"var(--c-accent-text)",fontWeight:600}}>{selected?getInitial(selected):"?"}</div>
            <div>
              <div style={{fontSize:14,fontWeight:500,color:"var(--c-text-heading)"}}>{selected?formatPhone(selected):""}</div>
              <div style={{fontSize:11,color:isHumanMode?"var(--c-success-text-light)":isAiActive?"var(--c-success)":"var(--c-text-faint)"}}>
                {isHumanMode ? `👤 ${t("mitarbeiter_antwortet")}` : isAiActive ? `🤖 ${t("ki_antwortet")}` : `⏳ ${t("warte_antwort")}`}

          <div ref={chatRef} style={{flex:1,overflowY:"auto",padding:"16px",display:"flex",flexDirection:"column",gap:12}}>

const CUSTOMER_WEBHOOK_URL = "https://patrickscloud.app.n8n.cloud/webhook/kunde-hinzufuegen";

function NeuerKundeModal({ onClose, onSuccess, t }) {
  const [form, setForm] = useState({ name: "", telefon: "", notizen: "" });
  const [submitting, setSubmitting] = useState(false);
  const [error, setError] = useState("");

  function update(field, value) { setForm(f => ({ ...f, [field]: value })); }

  async function handleSubmit() {
    if (!form.name || !form.telefon) {
      setError(t("kein_telefon"));
      return;
    }
    setSubmitting(true);
    setError("");
    try {
      const phone = form.telefon.startsWith("whatsapp:") ? form.telefon : `whatsapp:${form.telefon.startsWith("+") ? form.telefon : "+" + form.telefon}`;
      const res = await fetch(CUSTOMER_WEBHOOK_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name: form.name, telefon: phone, notizen: form.notizen, anzahlBuchungen: 0, sheetId: SHEET_ID })
      });
      if (!res.ok) throw new Error("Server-Fehler");
      onSuccess();
    } catch (e) {
      setError(t("fehler_speichern"));
    }
    setSubmitting(false);
  }

  return (
    <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"var(--c-overlay)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} className="card" style={{background:"var(--c-surface)",border:"1px solid var(--c-border)",borderRadius:14,padding:"1.5rem",width:400,maxWidth:"90vw"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1.25rem"}}>
          <div style={{fontSize:16,fontWeight:600,color:"var(--c-text-heading)"}}>👤 {t("kunde_hinzufuegen_titel")}</div>
          <button onClick={onClose} style={{background:"none",border:"none",color:"var(--c-text-faint)",fontSize:18,cursor:"pointer"}}>✕</button>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <div>
            <label style={{fontSize:11,color:"var(--c-text-faint)",marginBottom:4,display:"block"}}>{t("name")}</label>
            <input value={form.name} onChange={e => update("name", e.target.value)} placeholder="Max Mustermann" style={{width:"100%"}} />
          </div>
          <div>
            <label style={{fontSize:11,color:"var(--c-text-faint)",marginBottom:4,display:"block"}}>{t("telefon")}</label>
            <input value={form.telefon} onChange={e => update("telefon", e.target.value)} placeholder="+436XXXXXXXX" style={{width:"100%"}} />
          </div>
          <div>
            <label style={{fontSize:11,color:"var(--c-text-faint)",marginBottom:4,display:"block"}}>{t("notizen")} ({t("optional")})</label>
            <input value={form.notizen} onChange={e => update("notizen", e.target.value)} placeholder={t("notizen_platzhalter")} style={{width:"100%"}} />
          </div>
          {error && <div style={{fontSize:12,color:"var(--c-danger)",background:"var(--c-danger-bg)",padding:"8px 12px",borderRadius:8}}>{error}</div>}
          <button onClick={handleSubmit} disabled={submitting} style={{marginTop:8,padding:"10px",borderRadius:8,border:"none",background:submitting?"var(--c-border-strong)":"var(--c-accent)",color:"var(--c-on-accent)",fontWeight:500,fontSize:13,cursor:submitting?"default":"pointer",fontFamily:"inherit"}}>
            {submitting ? t("wird_gespeichert") : t("kunde_hinzufuegen_titel")}
          </button>
        </div>
      </div>
    </div>
  );
}

function RueckgabePage({ bookings, damages, t }) {
  const [tab, setTab] = useState("neu");
  const [toast, setToast] = useState("");
  const [buchungsId, setBuchungsId] = useState((bookings[0] || {}).id || "");
  const [typ, setTyp] = useState("Rückgabe");
  const [kategorie, setKategorie] = useState("Kratzer");
  const [teil, setTeil] = useState("");
  const [notiz, setNotiz] = useState("");
  const [file, setFile] = useState(null);
  const [kmAbholung, setKmAbholung] = useState("");
  const [kmRueckgabe, setKmRueckgabe] = useState("");
  const [kmPreisProKm, setKmPreisProKm] = useState("");
  const [tankLiter, setTankLiter] = useState("");
  const [tankKosten, setTankKosten] = useState("");
  const [kautionHoehe, setKautionHoehe] = useState("");
  const [submitting, setSubmitting] = useState(false);
  const [error, setError] = useState("");

  const abholEintrag = (damages || []).find(d => d.buchungsId === buchungsId && d.typ === "Abholung" && d.kmStand);
  const refKm = abholEintrag ? parseFloat(abholEintrag.kmStand) : null;
  const gefahreneKm = (typ === "Rückgabe" && refKm != null && kmRueckgabe) ? (parseFloat(kmRueckgabe) - refKm) : null;
  const kmKostenCalc = (gefahreneKm != null && kmPreisProKm) ? Math.max(0, gefahreneKm) * parseFloat(kmPreisProKm) : null;

  async function handleSubmit() {
    if (!buchungsId) { setError(t("bitte_buchung_waehlen")); return; }
    if (!file) { setError(t("bitte_foto_waehlen")); return; }
    setError(""); setSubmitting(true);
    try {
      const fd = new FormData();
      fd.append("buchungsId", buchungsId);
      fd.append("typ", typ);
      if (typ === "Abholung" && kmAbholung) fd.append("kmStand", kmAbholung);
      if (typ === "Rückgabe" && kmRueckgabe) fd.append("kmStand", kmRueckgabe);
      const parts = [
        kategorie && (t("kategorie_schaden") + ": " + kategorie),
        teil && (t("beschaedigtes_teil") + ": " + teil),
        notiz,
        typ === "Abholung" && kmAbholung && (t("km_stand_abholung") + ": " + kmAbholung + " km"),
        typ === "Rückgabe" && kmRueckgabe && (t("km_stand_rueckgabe") + ": " + kmRueckgabe + " km"),
        refKm != null && typ === "Rückgabe" && (t("km_stand_abholung") + ": " + refKm + " km"),
        gefahreneKm != null && (t("gefahrene_km") + ": " + Math.max(0, gefahreneKm) + " km"),
        kmKostenCalc != null && (t("km_kosten") + ": " + kmKostenCalc.toFixed(2) + " €"),
        tankLiter && (t("nachtanken") + ": " + tankLiter + " l"),
        tankKosten && (t("tank_kosten") + ": " + tankKosten + " €"),
        kautionHoehe && (t("kaution_hoehe") + ": " + kautionHoehe + " €"),
      ].filter(Boolean).join(" | ");
      fd.append("notiz", parts);
      fd.append("foto", file);
      const res = await fetch("https://patrickscloud.app.n8n.cloud/webhook/schaden-erfassen", { method: "POST", body: fd });
      if (!res.ok) throw new Error();
      setBuchungsId((bookings[0] || {}).id || ""); setTeil(""); setNotiz(""); setFile(null);
      setKmAbholung(""); setKmRueckgabe(""); setKmPreisProKm(""); setTankLiter(""); setTankKosten(""); setKautionHoehe("");
      setToast("✅ " + t("gespeichert")); setTab("alt"); setTimeout(() => setToast(""), 5000);
    } catch(e) { setError(t("fehler_speichern")); }
    setSubmitting(false);
  }

  const grouped = {};
  (damages || []).forEach(d => {
    if (!grouped[d.buchungsId]) grouped[d.buchungsId] = [];
    grouped[d.buchungsId].push(d);
  });
  const bids = Object.keys(grouped).sort().reverse();

  const inp = { width: "100%", marginTop: 4 };
  const sec = { borderTop: "1px solid var(--c-border)", paddingTop: 14, marginTop: 4 };

  return (
    <div>
      <div style={{marginBottom:"1.5rem"}}>
        <h1 style={{fontSize:22,fontWeight:600,color:"var(--c-text-heading)",margin:0}}>{t("rueckgabe_title")}</h1>
        <p style={{fontSize:12,color:"var(--c-text-faint)",marginTop:4}}>{t("rueckgabe_sub")}</p>
      </div>
      <div style={{display:"flex",gap:4,borderBottom:"1px solid var(--c-border)",marginBottom:"1.25rem"}}>
        <button onClick={() => setTab("neu")} style={{padding:"10px 16px",border:"none",borderBottom:tab==="neu"?"2px solid var(--c-accent)":"2px solid transparent",background:"transparent",color:tab==="neu"?"var(--c-text-body)":"var(--c-text-faint)",fontWeight:tab==="neu"?600:400,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>
          {t("tab_neuer_eintrag")}
        </button>
        <button onClick={() => setTab("alt")} style={{padding:"10px 16px",border:"none",borderBottom:tab==="alt"?"2px solid var(--c-accent)":"2px solid transparent",background:"transparent",color:tab==="alt"?"var(--c-text-body)":"var(--c-text-faint)",fontWeight:tab==="alt"?600:400,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>
          {t("tab_alte_eintraege")} ({(damages||[]).length})
        </button>
      </div>
      {toast && <div style={{fontSize:13,color:"var(--c-success)",background:"var(--c-success-bg)",border:"1px solid var(--c-success-border)",padding:"10px 14px",borderRadius:8,marginBottom:"1rem"}}>{toast}</div>}

      {tab === "neu" && (
        <div style={{display:"flex",flexDirection:"column",gap:14,maxWidth:560}}>
          <div>
            <label style={{fontSize:11,color:"var(--c-text-faint)",display:"block",marginBottom:4}}>{t("fahrzeug_waehlen")}</label>
            <select value={buchungsId} onChange={e => setBuchungsId(e.target.value)} style={{width:"100%"}}>
              {bookings.filter(b => b.status === "Bestätigt").map(b => <option key={b.id} value={b.id}>{b.id} · {b.name} · {b.auto}</option>)}
            </select>
          </div>
          <div style={{display:"flex",gap:8}}>
            {["Abholung","Rückgabe"].map(tp => (
              <button key={tp} onClick={() => setTyp(tp)} style={{flex:1,padding:"10px",borderRadius:8,border:`1px solid ${typ===tp?"var(--c-accent)":"var(--c-border)"}`,background:typ===tp?"var(--c-accent-bg)":"var(--c-surface-alt)",color:typ===tp?"var(--c-accent-text)":"var(--c-text-muted)",cursor:"pointer",fontFamily:"inherit",fontWeight:typ===tp?500:400}}>
                {tp === "Abholung" ? t("typ_abholung") : t("typ_rueckgabe")}
              </button>
            ))}
          </div>
          <div style={sec}>
            <div style={{fontSize:12,fontWeight:500,color:"var(--c-text-body)",marginBottom:10}}>🛠️ {t("schaden_titel")}</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
              <div>
                <label style={{fontSize:11,color:"var(--c-text-faint)",display:"block"}}>{t("kategorie_schaden")}</label>
                <select value={kategorie} onChange={e => setKategorie(e.target.value)} style={inp}>
                  <option value="Kratzer">{t("kat_kratzer")}</option>
                  <option value="Riss">{t("kat_riss")}</option>
                  <option value="Beule">{t("kat_beule")}</option>
                  <option value="Sonstiges">{t("kat_sonstiges")}</option>
                </select>
              </div>
              <div>
                <label style={{fontSize:11,color:"var(--c-text-faint)",display:"block"}}>{t("beschaedigtes_teil")}</label>
                <input value={teil} onChange={e => setTeil(e.target.value)} placeholder={t("beschaedigtes_teil")} style={inp}/>
              </div>
            </div>
            <div style={{marginBottom:10}}>
              <label style={{fontSize:11,color:"var(--c-text-faint)",display:"block"}}>{t("notiz_schaden")}</label>
              <input value={notiz} onChange={e => setNotiz(e.target.value)} placeholder={t("notiz_schaden")} style={inp}/>
            </div>
            <div>
              <label style={{fontSize:11,color:"var(--c-text-faint)",display:"block"}}>{t("foto_hochladen")}</label>
              <input type="file" accept="image/*" onChange={e => setFile(e.target.files[0]||null)} style={{...inp,fontSize:13,color:"var(--c-text-body)"}}/>
            </div>
          </div>
          <div style={sec}>
            <div style={{fontSize:12,fontWeight:500,color:"var(--c-text-body)",marginBottom:10}}>🛣️ {t("kilometerstand")}</div>
            {typ === "Abholung" ? (
              <div>
                <label style={{fontSize:11,color:"var(--c-text-faint)",display:"block"}}>{t("km_stand_abholung")}</label>
                <input type="number" value={kmAbholung} onChange={e => setKmAbholung(e.target.value)} placeholder="km" style={inp}/>
              </div>
            ) : (
              <div>
                {refKm != null ? (
                  <div style={{fontSize:12,color:"var(--c-text-muted)",background:"var(--c-surface-alt)",padding:"8px 12px",borderRadius:8,marginBottom:8}}>{refKm} km {t("bei_abholung")}</div>
                ) : (
                  <div style={{fontSize:11,color:"var(--c-warning)",background:"var(--c-warning-bg)",padding:"8px 12px",borderRadius:8,marginBottom:8}}>{t("kein_abholung_eintrag")}</div>
                )}
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                  <div>
                    <label style={{fontSize:11,color:"var(--c-text-faint)",display:"block"}}>{t("km_stand_rueckgabe")}</label>
                    <input type="number" value={kmRueckgabe} onChange={e => setKmRueckgabe(e.target.value)} placeholder="km" style={inp}/>
                  </div>
                  <div>
                    <label style={{fontSize:11,color:"var(--c-text-faint)",display:"block"}}>{t("preis_pro_km")}</label>
                    <input type="number" value={kmPreisProKm} onChange={e => setKmPreisProKm(e.target.value)} placeholder="€/km" style={inp}/>
                  </div>
                </div>
                {gefahreneKm != null && (
                  <div style={{fontSize:12,color:"var(--c-text-muted)",marginTop:6}}>
                    {t("gefahrene_km")}: <strong>{Math.max(0,gefahreneKm)} km</strong>
                    {kmKostenCalc != null && (" · " + t("km_kosten") + ": ")}
                    {kmKostenCalc != null && <strong>{kmKostenCalc.toFixed(2)} €</strong>}
                  </div>
                )}
              </div>
            )}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:10}}>
              <div>
                <label style={{fontSize:11,color:"var(--c-text-faint)",display:"block"}}>{t("nachtanken")}</label>
                <input type="number" value={tankLiter} onChange={e => setTankLiter(e.target.value)} placeholder="l" style={inp}/>
              </div>
              <div>
                <label style={{fontSize:11,color:"var(--c-text-faint)",display:"block"}}>{t("tank_kosten")}</label>
                <input type="number" value={tankKosten} onChange={e => setTankKosten(e.target.value)} placeholder="€" style={inp}/>
              </div>
            </div>
          </div>
          <div style={sec}>
            <div style={{fontSize:12,fontWeight:500,color:"var(--c-text-body)",marginBottom:4}}>💰 {t("kaution_info")}</div>
            <div style={{fontSize:11,color:"var(--c-text-faint)",marginBottom:8}}>{t("kaution_hinweis")}</div>
            <div>
              <label style={{fontSize:11,color:"var(--c-text-faint)",display:"block"}}>{t("kaution_hoehe")}</label>
              <input type="number" value={kautionHoehe} onChange={e => setKautionHoehe(e.target.value)} placeholder="€" style={inp}/>

          </div>
          {error && <div style={{fontSize:12,color:"var(--c-danger)",background:"var(--c-danger-bg)",padding:"8px 12px",borderRadius:8}}>{error}</div>}
          <button onClick={handleSubmit} disabled={submitting} style={{padding:"11px",borderRadius:8,border:"none",background:submitting?"var(--c-border)":"var(--c-accent)",color:"var(--c-on-accent)",fontWeight:500,fontSize:13,cursor:submitting?"default":"pointer",fontFamily:"inherit"}}>

      {tab === "alt" && (

  function Toggle({ checked, onChange }) {
    return (
      <div onClick={() => onChange(!checked)} style={{width:40,height:22,borderRadius:20,background:checked?"var(--c-accent)":"var(--c-border-strong)",position:"relative",cursor:"pointer",transition:"background 0.15s",flexShrink:0}}>
        <div style={{position:"absolute",top:2,left:checked?20:2,width:18,height:18,borderRadius:"50%",background:"#fff",transition:"left 0.15s"}} />
      </div>
    );
  }

  function handlePushToggle(v) {
    if (v && "Notification" in window) {
      Notification.requestPermission().then(perm => updateNotifSettings({ push: perm === "granted" }));
    } else {
      updateNotifSettings({ push: false });
    }
  }

  function handleExportBuchungen() {
    exportCSV("buchungen.csv", bookings, [
      { key: "id", label: "ID" }, { key: "name", label: t("kunde") }, { key: "telefon", label: t("telefon") },
      { key: "auto", label: t("fahrzeug_label") }, { key: "von", label: t("von_feld_kurz") }, { key: "bis", label: t("bis_feld_kurz") },
      { key: "preis", label: t("gesamtpreis") }, { key: "status", label: t("status") },
    ]);
  }
  function handleExportFahrzeuge() {
    exportCSV("fahrzeuge.csv", vehicles, [
      { key: "kennzeichen", label: t("kennzeichen") }, { key: "modell", label: t("modell") }, { key: "baujahr", label: t("baujahr") },
      { key: "preis", label: t("preis_tag") }, { key: "status", label: t("status") },
    ]);
  }
  function handleExportKunden() {
    exportCSV("kunden.csv", customers, [
      { key: "telefon", label: t("telefon") }, { key: "name", label: t("name") },
      { key: "letzteBuchung", label: t("letzte_buchung") }, { key: "anzahlBuchungen", label: t("buchungen_label") }, { key: "notizen", label: t("notizen") },
    ]);
  }

  const [wizardStep, setWizardStep] = useState(1);
  const TOTAL_STEPS = 4;
  const [sheetIdInput, setSheetIdInput] = useState(SHEET_ID);
  const [apiKeyInput, setApiKeyInput] = useState(GOOGLE_API_KEY);
  const [whatsappInput, setWhatsappInput] = useState(WHATSAPP_NUMBER);
  const [testStatus, setTestStatus] = useState(null); // null | "testing" | "success" | "error"

  async function handleTestConnection() {
    setTestStatus("testing");
    try {
      const url = `https://sheets.googleapis.com/v4/spreadsheets/${sheetIdInput}/values/Buchungen!A1:A1?key=${apiKeyInput}`;
      const res = await fetch(url);
      setTestStatus(res.ok ? "success" : "error");
    } catch(e) {
      setTestStatus("error");
    }
  }

  function handleSaveDataSource() {
    setDataSourceConfig(sheetIdInput, apiKeyInput, whatsappInput.trim());
    setJustSaved(true);
    setTimeout(() => { window.location.reload(); }, 900);
  }

  function handleResetDataSource() {
    resetDataSourceConfig();
    setSheetIdInput(DEFAULT_SHEET_ID);
    setApiKeyInput(DEFAULT_GOOGLE_API_KEY);
    setWhatsappInput("");
    setWizardStep(1);
    setJustSaved(true);
    setTimeout(() => { window.location.reload(); }, 900);
  }

  const inputStyle = { width:"100%", fontFamily:"monospace", fontSize:12 };
  const secondaryBtn = { padding:"9px 14px", borderRadius:8, border:"1px solid var(--c-border)", background:"var(--c-surface-alt)", color:"var(--c-text-body)", cursor:"pointer", fontSize:13, fontFamily:"inherit" };
  const primaryBtn = { padding:"9px 14px", borderRadius:8, border:"none", background:"var(--c-accent)", color:"var(--c-on-accent)", cursor:"pointer", fontSize:13, fontWeight:500, fontFamily:"inherit" };
  const exportBtn = { display:"flex", alignItems:"center", justifyContent:"space-between", gap:8, padding:"12px 14px", borderRadius:10, border:"1px solid var(--c-border)", background:"var(--c-surface-alt)", color:"var(--c-text-body)", cursor:"pointer", fontSize:13, fontFamily:"inherit", textAlign:"left", width:"100%" };
  const maskedKey = apiKeyInput.length > 10 ? `${apiKeyInput.slice(0,6)}...${apiKeyInput.slice(-4)}` : apiKeyInput;

  return (
    <div>
      <div style={{marginBottom:"1.5rem"}}>
        <h1 style={{fontSize:22,fontWeight:600,color:"var(--c-text-heading)",margin:0}}>{t("einstellungen_title")}</h1>
        <p style={{fontSize:12,color:"var(--c-text-faint)",marginTop:4}}>{t("einstellungen_sub")}</p>
      </div>

      {justSaved && (
        <div style={{fontSize:13,color:"var(--c-success)",background:"var(--c-success-bg)",border:"1px solid var(--c-success-border)",padding:"10px 14px",borderRadius:8,marginBottom:"1rem"}}>
          ✅ {t("gespeichert")}
        </div>
      )}

      <div style={{display:"flex",gap:"1.25rem",alignItems:"flex-start"}}>
        <div style={{flex:1,display:"flex",flexDirection:"column",gap:"1.25rem"}}>
          <div className="card" style={{background:"var(--c-surface)",border:"1px solid var(--c-border)",borderRadius:12,padding:"1.5rem"}}>
            <div style={{fontSize:13,fontWeight:500,color:"var(--c-text-body)",marginBottom:4}}>🌐 {t("sprache")}</div>
            <div style={{fontSize:12,color:"var(--c-text-faint)",marginBottom:"1rem"}}>{t("sprache_hinweis")}</div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {languages.map(l => (
                <div key={l.code} onClick={() => selectLang(l.code)} style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px",borderRadius:10,border:`1px solid ${lang===l.code?"var(--c-accent)":"var(--c-border)"}`,background:lang===l.code?"var(--c-accent-bg)":"var(--c-surface-alt)",cursor:"pointer",transition:"all 0.15s"}}>
                  <span style={{fontSize:18}}>{l.flag}</span>
                  <span style={{fontSize:14,color:lang===l.code?"var(--c-text-body)":"var(--c-text-muted)",fontWeight:lang===l.code?500:400,flex:1}}>{l.label}</span>
                  {lang===l.code && <span style={{color:"var(--c-accent-text)",fontSize:16}}>✓</span>}
                </div>
              ))}
            </div>
          </div>

          <div className="card" style={{background:"var(--c-surface)",border:"1px solid var(--c-border)",borderRadius:12,padding:"1.5rem"}}>
            <div style={{fontSize:13,fontWeight:500,color:"var(--c-text-body)",marginBottom:4}}>🔔 {t("notif_title")}</div>
            <div style={{fontSize:12,color:"var(--c-text-faint)",marginBottom:"1rem"}}>{t("notif_hinweis")}</div>
            <div style={{display:"flex",flexDirection:"column",gap:14}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:10}}>
                <div>
                  <div style={{fontSize:13,color:"var(--c-text-body)"}}>{t("notif_sound_buchung")}</div>
                  <div style={{fontSize:11,color:"var(--c-text-faint)",marginTop:1}}>{t("notif_sound_buchung_sub")}</div>
                </div>
                <Toggle checked={notifSettings.soundBooking} onChange={v => updateNotifSettings({ soundBooking: v })} />
              </div>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:10}}>
                <div>
                  <div style={{fontSize:13,color:"var(--c-text-body)"}}>{t("notif_sound_chat")}</div>
                  <div style={{fontSize:11,color:"var(--c-text-faint)",marginTop:1}}>{t("notif_sound_chat_sub")}</div>
                </div>
                <Toggle checked={notifSettings.soundChat} onChange={v => updateNotifSettings({ soundChat: v })} />
              </div>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:10}}>
                <div>
                  <div style={{fontSize:13,color:"var(--c-text-body)"}}>{t("notif_push")}</div>
                  <div style={{fontSize:11,color:"var(--c-text-faint)",marginTop:1}}>{t("notif_push_sub")}</div>
                </div>
                <Toggle checked={notifSettings.push} onChange={handlePushToggle} />
              </div>
              <button onClick={onTestSound} style={{...secondaryBtn, alignSelf:"flex-start"}}>{t("notif_test")}</button>
            </div>
          </div>

          <div className="card" style={{background:"var(--c-surface)",border:"1px solid var(--c-border)",borderRadius:12,padding:"1.5rem"}}>
            <div style={{fontSize:13,fontWeight:500,color:"var(--c-text-body)",marginBottom:4}}>📤 {t("export_title")}</div>
            <div style={{fontSize:12,color:"var(--c-text-faint)",marginBottom:"1rem"}}>{t("export_hinweis")}</div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              <button onClick={handleExportBuchungen} style={exportBtn}><span>📅 {t("export_buchungen")}</span><span style={{color:"var(--c-text-faint)"}}>{bookings.length}</span></button>
              <button onClick={handleExportFahrzeuge} style={exportBtn}><span>🚗 {t("export_fahrzeuge")}</span><span style={{color:"var(--c-text-faint)"}}>{vehicles.length}</span></button>
              <button onClick={handleExportKunden} style={exportBtn}><span>👥 {t("export_kunden")}</span><span style={{color:"var(--c-text-faint)"}}>{customers.length}</span></button>
            </div>
          </div>
        </div>

        <div style={{flex:1,display:"flex",flexDirection:"column",gap:"1.25rem"}}>
          <div className="card" style={{background:"var(--c-surface)",border:"1px solid var(--c-border)",borderRadius:12,padding:"1.5rem"}}>
            <div style={{fontSize:13,fontWeight:500,color:"var(--c-text-body)",marginBottom:4}}>🎨 {t("design_title")}</div>
            <div style={{fontSize:12,color:"var(--c-text-faint)",marginBottom:"1rem"}}>{t("design_hinweis")}</div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {[
                { code: "classic", label: t("design_classic"), sub: t("design_classic_sub") },
                { code: "led", label: t("design_led"), sub: t("design_led_sub") },
                { code: "pro", label: t("design_pro"), sub: t("design_pro_sub") },
              ].map(d => (
                <div key={d.code} onClick={() => selectDesign(d.code)} style={{display:"flex",alignItems:"center",gap:14,padding:"12px 14px",borderRadius:10,border:`1px solid ${design===d.code?"var(--c-accent)":"var(--c-border)"}`,background:design===d.code?"var(--c-accent-bg)":"var(--c-surface-alt)",cursor:"pointer",transition:"all 0.15s"}}>
                  <DesignPreview variant={d.code} />
                  <div style={{flex:1}}>
                    <div style={{fontSize:14,fontWeight:design===d.code?500:400,color:design===d.code?"var(--c-text-body)":"var(--c-text-muted)"}}>{d.label}</div>
                    <div style={{fontSize:11,color:"var(--c-text-faint)",marginTop:1}}>{d.sub}</div>
                  </div>
                  {design===d.code && <span style={{color:"var(--c-accent-text)",fontSize:16}}>✓</span>}
                </div>
              ))}
            </div>
          </div>

          <div className="card" style={{background:"var(--c-surface)",border:"1px solid var(--c-border)",borderRadius:12,padding:"1.5rem"}}>
            <div style={{fontSize:13,fontWeight:500,color:"var(--c-text-body)",marginBottom:4}}>⏱️ {t("intervall_title")}</div>
            <div style={{fontSize:12,color:"var(--c-text-faint)",marginBottom:"1rem"}}>{t("intervall_hinweis")}</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {intervalOptions.map(ms => (
                <div key={ms} onClick={() => selectInterval(ms)} style={{padding:"10px 16px",borderRadius:10,border:`1px solid ${refreshInterval===ms?"var(--c-accent)":"var(--c-border)"}`,background:refreshInterval===ms?"var(--c-accent-bg)":"var(--c-surface-alt)",cursor:"pointer",fontSize:14,fontWeight:refreshInterval===ms?500:400,color:refreshInterval===ms?"var(--c-text-body)":"var(--c-text-muted)",transition:"all 0.15s"}}>
                  {ms/1000}s
                </div>
              ))}
            </div>
          </div>

          <div className="card" style={{background:"var(--c-surface)",border:"1px solid var(--c-border)",borderRadius:12,padding:"1.5rem"}}>
            <div style={{fontSize:13,fontWeight:500,color:"var(--c-text-body)",marginBottom:4}}>🗄️ {t("datenquelle_title")}</div>
            <div style={{fontSize:12,color:"var(--c-text-faint)",marginBottom:"1rem"}}>{t("datenquelle_hinweis")}</div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              <div>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  {Array.from({ length: TOTAL_STEPS }).map((_, i) => (
                    <div key={i} style={{height:4,flex:1,borderRadius:2,background:i < wizardStep ? "var(--c-accent)" : "var(--c-border)"}} />
                  ))}
                </div>
                <div style={{fontSize:11,color:"var(--c-text-faint)",marginTop:6}}>{t("schritt_label")} {wizardStep} {t("von_label")} {TOTAL_STEPS}</div>
              </div>

              {wizardStep === 1 && (
                <div>
                  <div style={{fontSize:13,fontWeight:500,color:"var(--c-text-body)",marginBottom:4}}>{t("ds_step1_title")}</div>
                  <div style={{fontSize:12,color:"var(--c-text-faint)",marginBottom:"1rem"}}>{t("ds_step1_hinweis")}</div>
                  <input value={sheetIdInput} onChange={e => setSheetIdInput(e.target.value)} style={inputStyle} />
                </div>
              )}

              {wizardStep === 2 && (
                <div>
                  <div style={{fontSize:13,fontWeight:500,color:"var(--c-text-body)",marginBottom:4}}>{t("ds_step2_title")}</div>
                  <div style={{fontSize:12,color:"var(--c-text-faint)",marginBottom:"1rem"}}>{t("ds_step2_hinweis")}</div>
                  <input value={apiKeyInput} onChange={e => setApiKeyInput(e.target.value)} style={inputStyle} />
                  {testStatus && (
                    <div style={{fontSize:12,marginTop:8,color:testStatus==="success"?"var(--c-success)":testStatus==="error"?"var(--c-danger)":"var(--c-text-faint)"}}>
                      {testStatus==="testing" ? t("verbindung_testet") : testStatus==="success" ? t("verbindung_erfolgreich") : t("verbindung_fehlgeschlagen")}
                    </div>
                  )}
                  <button onClick={handleTestConnection} style={{...secondaryBtn, marginTop:10}}>{t("verbindung_testen")}</button>
                </div>
              )}

              {wizardStep === 3 && (
                <div>
                  <div style={{fontSize:13,fontWeight:500,color:"var(--c-text-body)",marginBottom:4}}>{t("ds_step3_title")}</div>
                  <div style={{fontSize:12,color:"var(--c-text-faint)",marginBottom:"1rem"}}>{t("ds_step3_hinweis")}</div>
                  <input value={whatsappInput} onChange={e => setWhatsappInput(e.target.value)} placeholder={t("ds_whatsapp_placeholder")} style={inputStyle} />
                </div>
              )}

              {wizardStep === 4 && (
                <div>
                  <div style={{fontSize:13,fontWeight:500,color:"var(--c-text-body)",marginBottom:4}}>{t("ds_step4_title")}</div>
                  <div style={{fontSize:12,color:"var(--c-text-faint)",marginBottom:"1rem"}}>{t("ds_step4_hinweis")}</div>
                  <div style={{display:"flex",flexDirection:"column",gap:6,fontSize:12,background:"var(--c-surface-alt)",border:"1px solid var(--c-border)",borderRadius:8,padding:"10px 12px"}}>
                    <div><span style={{color:"var(--c-text-faint)"}}>{t("sheet_id_label")}: </span><span style={{fontFamily:"monospace",color:"var(--c-text-body)"}}>{sheetIdInput}</span></div>
                    <div><span style={{color:"var(--c-text-faint)"}}>{t("api_key_label")}: </span><span style={{fontFamily:"monospace",color:"var(--c-text-body)"}}>{maskedKey}</span></div>
                    <div><span style={{color:"var(--c-text-faint)"}}>{t("ds_whatsapp_label")}: </span><span style={{color:"var(--c-text-body)"}}>{whatsappInput || t("ds_keine_angabe")}</span></div>
                  </div>
                </div>
              )}

              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {wizardStep > 1 && <button onClick={() => setWizardStep(s => s - 1)} style={secondaryBtn}>{t("zurueck")}</button>}
                {wizardStep < TOTAL_STEPS && <button onClick={() => setWizardStep(s => s + 1)} style={primaryBtn}>{t("weiter")}</button>}
                {wizardStep === TOTAL_STEPS && <button onClick={handleSaveDataSource} style={primaryBtn}>{t("speichern")}</button>}
                <button onClick={handleResetDataSource} style={secondaryBtn}>{t("zuruecksetzen")}</button>
              </div>
              <div style={{fontSize:11,color:"var(--c-text-faint2)"}}>{t("datenquelle_reload_hinweis")}</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function App() {
  const { refreshInterval, setRefreshInterval } = useRefreshInterval();
  const { bookings, chats, vehicles, customers, damages, lastUpdated } = useSheetData(refreshInterval);
  const { lang, setLang, t } = useLanguage();
  const { design, setDesign } = useTheme();
  const { notifSettings, updateNotifSettings } = useNotificationSettings();
  const playBeep = useNotificationSound();
  const [page, setPage] = useState(0);
  const [time, setTime] = useState(new Date());
  useEffect(() => { const timer = setInterval(() => setTime(new Date()), 1000); return () => clearInterval(timer); }, []);

  const prevBookingsCount = useRef(null);
  useEffect(() => {
    if (prevBookingsCount.current === null) { prevBookingsCount.current = bookings.length; return; }
    if (bookings.length > prevBookingsCount.current) {
      const neu = bookings[bookings.length - 1];
      if (notifSettings.soundBooking) playBeep();
      if (notifSettings.push) sendPushNotification(t("notif_neue_buchung_titel"), `${neu?.name||""} · ${neu?.auto||""}`);
    }
    prevBookingsCount.current = bookings.length;
  }, [bookings, notifSettings.soundBooking, notifSettings.push]);

  const prevChatUserCount = useRef(null);
  useEffect(() => {
    const userMsgs = chats.filter(c => c.rolle === "user");
    if (prevChatUserCount.current === null) { prevChatUserCount.current = userMsgs.length; return; }
    if (userMsgs.length > prevChatUserCount.current) {
      const last = userMsgs[userMsgs.length - 1];
      if (notifSettings.soundChat) playBeep();
      if (notifSettings.push) sendPushNotification(t("notif_neue_nachricht_titel"), last?.nachricht || "");
    }
    prevChatUserCount.current = userMsgs.length;
  }, [chats, notifSettings.soundChat, notifSettings.push]);

  const activeFleet = vehicles.filter(v => v.status === "Aktiv").map(v => ({ name: v.modell, price: parseFloat((v.preis||"0").replace(/[^\d.]/g,"")) }));

  return (
    <div style={{display:"flex",minHeight:"100vh"}}>
      <Sidebar page={page} setPage={setPage} time={time} t={t} lang={lang} />
      <main style={{marginLeft:220,flex:1,padding:"1.5rem 2rem",maxWidth:"calc(100vw - 220px)"}}>
        {page === 0 && <UebersichtPage bookings={bookings} chats={chats} vehicles={vehicles} lastUpdated={lastUpdated} t={t} />}
        {page === 1 && <BuchungenPage bookings={bookings} fleet={activeFleet} t={t} />}
        {page === 2 && <FahrzeugePage bookings={bookings} t={t} refreshInterval={refreshInterval} />}
        {page === 3 && <ChatsPage chats={chats} t={t} />}
        {page === 4 && <KundenPage customers={customers} bookings={bookings} t={t} />}
        {page === 5 && <RueckgabePage bookings={bookings} damages={damages||[]} t={t} />}
        {page === 6 && <EinstellungenPage lang={lang} setLang={setLang} design={design} setDesign={setDesign} notifSettings={notifSettings} updateNotifSettings={updateNotifSettings} onTestSound={playBeep} refreshInterval={refreshInterval} setRefreshInterval={setRefreshInterval} bookings={bookings} vehicles={vehicles} customers={customers} t={t} />}
      </main>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
</html>
